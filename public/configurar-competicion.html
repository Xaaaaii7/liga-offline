<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Liga offline — Configurar competición</title>
  <script src="js/theme-preload.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="page-configurar-competicion">
  <header class="site-header">
    <img src="img/logo.png" alt="Logo" class="logo" />
    <h1>Configurar competición</h1>
    <nav id="main-nav"></nav>
  </header>

  <main class="container" id="configurar-root">
    <div id="breadcrumb"></div>

    <section class="table-wrap">
      <h2>Equipos</h2>
      <p style="color:var(--muted)">Marca qué equipos controla un jugador humano. El resto se resuelven simulando (<code>scripts/simulate-match.js</code>).</p>
      <table>
        <thead>
          <tr>
            <th>Equipo</th>
            <th>Club</th>
            <th>Humano</th>
          </tr>
        </thead>
        <tbody id="tabla-equipos"></tbody>
      </table>
    </section>

    <section class="table-wrap">
      <h2>Calendario</h2>
      <div class="form-group">
        <label for="start-date">Fecha de inicio de la jornada 1</label>
        <input type="date" id="start-date" />
      </div>
      <button type="button" id="btn-generar-calendario" class="btn btn-primary">Generar calendario</button>
      <p id="calendario-status"></p>
    </section>
  </main>

  <footer class="site-footer">Liga offline</footer>

  <script type="module" src="js/loader.js"></script>
  <script type="module" src="js/core-loader.js"></script>
  <script type="module" src="js/liga/configurar-competicion.js"></script>
</body>

</html>
