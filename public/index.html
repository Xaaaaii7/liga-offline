<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Liga offline</title>
  <script src="js/theme-preload.js"></script>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/competitions.css" />
</head>

<body class="page-competitions">
  <header class="site-header">
    <img src="img/logo.png" alt="Logo" class="logo" />
    <h1>Liga offline</h1>
    <nav id="main-nav"></nav>
  </header>

  <main class="container competitions-container">
    <section class="competitions-filters">
      <div class="filters-row">
        <h2 style="margin:0">Tus competiciones</h2>
        <div class="create-competition-section">
          <a href="crear-competicion.html" class="btn-create-competition">➕ Crear competición</a>
        </div>
      </div>
    </section>

    <section class="competitions-list-section">
      <div id="competitions-loading" class="loading-message">
        <p>Cargando competiciones…</p>
      </div>
      <div id="competitions-empty" class="empty-state" style="display:none">
        <p>Todavía no hay ninguna competición. Crea la primera con el botón de arriba.</p>
      </div>
      <div id="competitions-grid" class="comps-grid"></div>
    </section>
  </main>

  <footer class="site-footer">Liga offline</footer>

  <script type="module" src="js/loader.js"></script>
  <script type="module" src="js/core-loader.js"></script>
  <script type="module" src="js/liga/index-home.js"></script>
</body>

</html>
