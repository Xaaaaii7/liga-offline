<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Liga offline — Crear competición</title>
  <script src="js/theme-preload.js"></script>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .cc-clubs { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 4px 16px; }
    .cc-league-group { margin-bottom: 16px; }
    .cc-league-group h4 { margin-bottom: 4px; }
    .cc-club-option { display: flex; align-items: center; gap: 6px; }
    .cc-count { font-weight: bold; }
  </style>
</head>

<body class="page-crear-competicion">
  <header class="site-header">
    <img src="img/logo.png" alt="Logo" class="logo" />
    <h1>Crear competición</h1>
    <nav id="main-nav"></nav>
  </header>

  <main class="container" id="crear-competicion-root">
    <div id="messages"></div>

    <form id="crear-competicion-form">
      <section class="table-wrap">
        <h2>Información básica</h2>
        <div class="form-group">
          <label for="name">Nombre de la competición *</label>
          <input type="text" id="name" name="name" required placeholder="Ej: Liga Premier 2026-27" />
        </div>
        <div class="form-group">
          <label for="slug">Slug (URL) *</label>
          <input type="text" id="slug" name="slug" required placeholder="liga-premier-2026-27" />
          <small>Se genera automáticamente desde el nombre si se deja vacío.</small>
        </div>
        <div class="form-group">
          <label for="season">Temporada *</label>
          <select id="season" name="season" required></select>
        </div>
      </section>

      <section class="table-wrap">
        <h2>Configuración de liga</h2>
        <div class="form-group">
          <label for="league_format">Formato</label>
          <select id="league_format" name="league_format">
            <option value="double_round">2 vueltas (ida y vuelta)</option>
            <option value="single_round">1 vuelta</option>
          </select>
        </div>
        <div class="form-group">
          <label for="points_win">Puntos por victoria</label>
          <input type="number" id="points_win" name="points_win" min="0" value="3" />
        </div>
        <div class="form-group">
          <label for="points_draw">Puntos por empate</label>
          <input type="number" id="points_draw" name="points_draw" min="0" value="1" />
        </div>
        <div class="form-group">
          <label for="points_loss">Puntos por derrota</label>
          <input type="number" id="points_loss" name="points_loss" min="0" value="0" />
        </div>
        <div class="form-group">
          <label>Criterios de desempate (orden de prioridad)</label>
          <div id="tiebreaker-list">
            <label class="checkbox-label"><input type="checkbox" name="tiebreaker" value="points" checked /> Puntos</label>
            <label class="checkbox-label"><input type="checkbox" name="tiebreaker" value="goal_difference" checked /> Diferencia de goles</label>
            <label class="checkbox-label"><input type="checkbox" name="tiebreaker" value="goals_for" checked /> Goles a favor</label>
            <label class="checkbox-label"><input type="checkbox" name="tiebreaker" value="head_to_head" checked /> Enfrentamiento directo</label>
          </div>
        </div>
      </section>

      <section class="table-wrap">
        <h2>Equipos (<span class="cc-count" id="clubs-count">0</span> seleccionados, mínimo 2)</h2>
        <div id="clubs-picker" class="cc-clubs">Cargando clubes…</div>
      </section>

      <section class="table-wrap">
        <button type="submit" id="submit-btn">Crear competición</button>
      </section>
    </form>
  </main>

  <footer class="site-footer">Liga offline</footer>

  <script type="module" src="js/loader.js"></script>
  <script type="module" src="js/core-loader.js"></script>
  <script type="module" src="js/liga/crear-competicion.js"></script>
</body>

</html>
