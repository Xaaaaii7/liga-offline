<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Liga offline — Jornada</title>
  <script src="js/theme-preload.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="page-jornada-offline">
  <header class="site-header">
    <img src="img/logo.png" alt="Logo" class="logo" />
    <h1 id="jornada-title">Jornada</h1>
    <nav id="main-nav"></nav>
  </header>

  <main class="container" id="jornada-root">
    <div id="breadcrumb"></div>

    <div class="ritmo-controls">
      <button type="button" id="btn-jornada-prev">‹ Anterior</button>
      <span id="jornada-numero"></span>
      <button type="button" id="btn-jornada-next">Siguiente ›</button>
    </div>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Local</th>
            <th>Marcador</th>
            <th>Visitante</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="tabla-partidos"></tbody>
      </table>
    </section>
  </main>

  <footer class="site-footer">Liga offline</footer>

  <script type="module" src="js/loader.js"></script>
  <script type="module" src="js/core-loader.js"></script>
  <script type="module" src="js/liga/jornada-offline.js"></script>
</body>

</html>
